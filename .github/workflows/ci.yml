name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: pip install "cython>=3.2.4" "setuptools>=82" "coverage>=7.13"

      - name: Compile
        run: bash scripts/compile.sh --force

      - name: Run tests
        run: bash scripts/run_tests.sh
