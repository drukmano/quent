name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'benchmarks/**'
      - 'hooks/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/CODEOWNERS'
      - '.github/dependabot.yml'
      - '.readthedocs.yml'
      - '.readthedocs.yaml'
      - '.gitignore'
      - 'mkdocs.yml'
      - 'MANIFEST.in'
      - 'LICENSE'
      - 'llms.txt'
      - 'llms-full.txt'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'benchmarks/**'
      - 'hooks/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/CODEOWNERS'
      - '.github/dependabot.yml'
      - '.readthedocs.yml'
      - '.readthedocs.yaml'
      - '.gitignore'
      - 'mkdocs.yml'
      - 'MANIFEST.in'
      - 'LICENSE'
      - 'llms.txt'
      - 'llms-full.txt'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --group dev --python 3.14

      - name: Verify lock file is up to date
        run: uv lock --check

      - name: Format check
        run: uv run ruff format --check quent/ tests/

      - name: Lint check
        run: uv run ruff check quent/ tests/

      - name: Type check
        run: uv run mypy quent/

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          # Free-threaded builds (experimental) — all platforms
          - os: ubuntu-latest
            python-version: "3.13t"
            experimental: true
          - os: ubuntu-latest
            python-version: "3.14t"
            experimental: true
          - os: windows-latest
            python-version: "3.13t"
            experimental: true
          - os: windows-latest
            python-version: "3.14t"
            experimental: true
          - os: macos-latest
            python-version: "3.13t"
            experimental: true
          - os: macos-latest
            python-version: "3.14t"
            experimental: true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        if: ${{ !(matrix.os == 'windows-latest' && matrix.python-version == '3.13t') }}
        run: uv sync ${{ matrix.experimental && '--no-group dev --group test' || '--group dev' }} --python ${{ matrix.python-version }}

      - name: Install dependencies (Windows 3.13t — skip trio, cffi incompatible with free-threaded 3.13)
        if: matrix.os == 'windows-latest' && matrix.python-version == '3.13t'
        shell: bash
        run: |
          uv sync --no-group dev --no-group test --python ${{ matrix.python-version }}
          uv pip install hypothesis "curio>=1.6"

      - name: Compile
        run: uv run python -m compileall -q quent/

      - name: Run tests
        run: uv run python scripts/run_tests_parallel.py --slow ${{ (matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12') && '--coverage' || '' }}

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        with:
          files: coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --group dev --python 3.14

      - name: Audit dependencies
        run: uv run pip-audit

      - name: SAST scan
        run: uv run bandit -r quent/ -c pyproject.toml
