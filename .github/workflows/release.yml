name: Release & Publish

# SECURITY NOTE (workflow_run + contents:write + id-token:write):
# This workflow triggers on workflow_run completion, which is a known privilege
# escalation vector in GitHub Actions when combined with write permissions.
# This usage is safe because:
#   1. It only triggers on the master branch (not PRs or forks).
#   2. It does NOT download or process artifacts from the triggering workflow.
#   3. It only reads pyproject.toml from the checked-out code (not from artifacts).
#   4. The only user-controlled input is the commit SHA (github.event.workflow_run.head_sha),
#      which is a hex hash — not arbitrary text — and is passed via environment variable
#      (not shell interpolation).
#   5. The gh API call and release creation use environment variables, not ${{ }} interpolation
#      in run: blocks, preventing script injection.
#   6. PyPI publishing uses trusted publishing (id-token:write) scoped to the `pypi`
#      environment, which requires environment protection rules.
#   7. Build artifacts are produced and consumed within this workflow only —
#      never downloaded from external sources.
# If modifying this workflow, do NOT introduce artifact processing or user-controlled
# string interpolation in run: blocks. See GitHub Security Lab advisories on workflow_run.

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      published: ${{ steps.create_release.outputs.published }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Verify CI passed (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          STATUS=$(gh api "repos/$REPO/commits/$SHA/status" --jq '.state')
          if [ "$STATUS" != "success" ]; then
            echo "::error::CI has not passed on this commit (status: $STATUS). Aborting release."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for version bump
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; f=open('pyproject.toml','rb'); v=tomllib.load(f)['project']['version']; f.close(); print(v)")
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New version $VERSION detected, will create release."
          fi

      - name: Create GitHub Release
        id: create_release
        if: steps.version.outputs.exists == 'false'
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
          echo "published=true" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: write
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Validate version matches tag
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          VERSION=$(python3 -c "import tomllib; f=open('pyproject.toml','rb'); v=tomllib.load(f)['project']['version']; f.close(); print(v)")
          if [ "v$VERSION" != "$TAG" ]; then
            echo "::error::Version mismatch: pyproject.toml has $VERSION but tag is $TAG"
            exit 1
          fi
          echo "Version $VERSION matches tag $TAG"

      - name: Build sdist and wheel
        run: uv build

      - name: Generate checksums
        run: sha256sum dist/* > dist/checksums.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist/*'

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Verify checksums
        run: sha256sum --check dist/checksums.sha256 && rm dist/checksums.sha256

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
