[build-system]
requires = ["setuptools>=82", "wheel", "cython>=3.2.4"]
build-backend = "setuptools.build_meta"

[project]
name = "quent"
version = "3.0.1"
authors = [{ name = "Ohad Drukman", email = "drukmano@icloud.com" }]
description = "High-performance fluent chain interface for Python with transparent sync/async handling. Write pipeline code once -- Quent automatically detects coroutines and handles them. Built-in retry, timeout, and context propagation. Cython-compiled, zero dependencies."
license = "MIT"
readme = "README.md"
requires-python = ">=3.14"
keywords = [
    'chain', 'chaining', 'pipeline', 'fluent', 'pipe',
    'async', 'sync', 'asyncio', 'coroutine', 'await',
    'retry', 'timeout', 'resilience',
    'cython', 'performance',
    'function-composition', 'middleware',
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Cython",
    "Framework :: AsyncIO",
    "Topic :: Software Development",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/drukmano/quent"
Documentation = "https://quent.readthedocs.io"
Repository = "https://github.com/drukmano/quent"
Changelog = "https://github.com/drukmano/quent/releases"
Issues = "https://github.com/drukmano/quent/issues"

[tool.cibuildwheel]
build = "cp314-*"
skip = "*-musllinux*"
test-command = "python -m unittest discover -s {project}/tests -p '*_tests.py'"

[tool.cibuildwheel.linux]
archs = ["x86_64", "aarch64"]

[tool.cibuildwheel.macos]
archs = ["x86_64", "arm64"]

[tool.cibuildwheel.windows]
archs = ["AMD64"]

[tool.coverage.run]
plugins = ["Cython.Coverage"]
source = ["quent"]

[dependency-groups]
dev = [
    "cython>=3.2.4",
    "build>=1.4",
    "coverage>=7.13",
    "twine>=6.2",
    "setuptools>=82",
]
