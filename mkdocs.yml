site_name: Quent
site_description: "Python pipeline library with transparent sync/async handling"
site_url: https://quent.readthedocs.io
repo_url: https://github.com/drukmano/quent
repo_name: drukmano/quent

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guide:
    - Chains: guide/chains.md
    - Async Handling: guide/async.md
    - Error Handling: guide/error-handling.md
    - Reuse & Patterns: guide/reuse.md
  - Comparisons:
    - vs unasync: comparisons/vs-unasync.md
  - API Reference: reference.md
